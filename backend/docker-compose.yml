services:
  nacos:
    image: nacos/nacos-server:v2.4.2
    container_name: advisor-nacos
    environment:
      MODE: standalone
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 10s
      timeout: 5s
      retries: 20

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: advisor-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: advisor-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: advisor_ai
    ports:
      - "5432:5432"
    volumes:
      - backend_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d advisor_ai"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    container_name: advisor-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: advisor-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: advisor-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 20

  ai-gateway:
    build:
      context: ./ai-gateway
      dockerfile: Dockerfile
    container_name: advisor-ai-gateway
    environment:
      APP_NAME: aigateway
      HTTP_ADDR: 0.0.0.0:8080
      MASTER_API_KEY: ${AI_GATEWAY_MASTER_API_KEY:-dev-key}
      REDIS_ADDR: redis://redis:6379
      RATE_LIMIT_PER_MIN: 120
      RATE_LIMIT_TENANT_PER_MIN: 240
      RATE_LIMIT_ROUTE_PER_MIN: 120
      RATE_LIMIT_MODEL_PER_MIN: 120
      RATE_LIMIT_WINDOW_MS: 60000
      PROVIDER_BASE_URL: ${AI_PROVIDER_BASE_URL:-https://api.openai.com/v1}
      PROVIDER_API_KEY: ${AI_PROVIDER_API_KEY:-}
      PROVIDER_MODEL: ${AI_PROVIDER_MODEL:-gpt-4.1-mini}
      PROVIDER_TIMEOUT_SEC: 60
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8090:8080"

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: advisor-auth-service
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: advisor_ai
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      ADVISOR_JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      INTERNAL_SERVICE_TOKEN: arookieofc
      MEMORY_API_TOKEN: arookieofc
      AGENT_API_TOKEN: arookieofc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"

  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    container_name: advisor-chat-service
    environment:
      SPRING_PROFILES_ACTIVE: local
      NACOS_SERVER_ADDR: nacos:8848
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: advisor_ai
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      ADVISOR_JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      INTERNAL_SERVICE_TOKEN: arookieofc
      MEMORY_API_TOKEN: arookieofc
      AGENT_API_TOKEN: arookieofc
      AGENT_BASE_URL: http://host.docker.internal:8001
      AI_GATEWAY_ENABLED: "false"
      AI_GATEWAY_BASE_URL: http://ai-gateway:8080
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_MASTER_API_KEY:-dev-key}
      AI_GATEWAY_MODEL: ${AI_PROVIDER_MODEL:-gpt-4.1-mini}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      PROMETHEUS_BASE_URL: http://prometheus:9090
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      ai-gateway:
        condition: service_started
    ports:
      - "8082:8082"

  rag-service:
    build:
      context: .
      dockerfile: rag-service/Dockerfile
    container_name: advisor-rag-service
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: advisor_ai
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      ADVISOR_JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      INTERNAL_SERVICE_TOKEN: arookieofc
      MEMORY_API_TOKEN: arookieofc
      AGENT_API_TOKEN: arookieofc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"

  memory-service:
    build:
      context: .
      dockerfile: memory-service/Dockerfile
    container_name: advisor-memory-service
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: advisor_ai
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      ADVISOR_JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      INTERNAL_SERVICE_TOKEN: arookieofc
      MEMORY_API_TOKEN: arookieofc
      AGENT_API_TOKEN: arookieofc
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8084:8084"

  audit-service:
    build:
      context: .
      dockerfile: audit-service/Dockerfile
    container_name: advisor-audit-service
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: advisor_ai
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      ADVISOR_JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      INTERNAL_SERVICE_TOKEN: arookieofc
      MEMORY_API_TOKEN: arookieofc
      AGENT_API_TOKEN: arookieofc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8085:8085"

  risk-control-service:
    build:
      context: .
      dockerfile: risk-control-service/Dockerfile
    container_name: advisor-risk-control-service
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: advisor_ai
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      ADVISOR_JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      INTERNAL_SERVICE_TOKEN: arookieofc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8086:8086"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: advisor-gateway
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      ADVISOR_JWT_SECRET: Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=
      RISK_CONTROL_SERVICE_URL: http://risk-control-service:8086
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      nacos:
        condition: service_healthy
      auth-service:
        condition: service_started
      chat-service:
        condition: service_started
      rag-service:
        condition: service_started
      memory-service:
        condition: service_started
      audit-service:
        condition: service_started
      risk-control-service:
        condition: service_started
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: advisor-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      gateway:
        condition: service_started
      auth-service:
        condition: service_started
      chat-service:
        condition: service_started
      rag-service:
        condition: service_started
      memory-service:
        condition: service_started
      audit-service:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.2
    container_name: advisor-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: advisor-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: advisor-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8088:8080"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: advisor-node-exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro
    ports:
      - "9100:9100"

volumes:
  backend_pg_data:
  prometheus_data:
  grafana_data:
