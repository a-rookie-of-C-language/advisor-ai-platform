server:
  port: 8080

spring:
  config:
    import: optional:nacos:advisor-ai-platform-common.yaml
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**,/api/session/**,/api/monitor/**
        - id: rag-service
          uri: lb://rag-service
          predicates:
            - Path=/api/rag/**
        - id: memory-service
          uri: lb://memory-service
          predicates:
            - Path=/api/memory/**
        - id: audit-service
          uri: lb://audit-service
          predicates:
            - Path=/api/audit/**

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://127.0.0.1:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

advisor:
  jwt:
    secret: ${JWT_SECRET:${ADVISOR_JWT_SECRET:Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=}}
  risk:
    control-service-url: ${RISK_CONTROL_SERVICE_URL:http://risk-control-service:8086}

