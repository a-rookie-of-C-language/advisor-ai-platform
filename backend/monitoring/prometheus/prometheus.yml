global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["auth-service:8081"]

  - job_name: chat-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["chat-service:8082"]

  - job_name: rag-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["rag-service:8083"]

  - job_name: memory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["memory-service:8084"]

  - job_name: audit-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["audit-service:8085"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
