server:
  port: 8080

spring:
  profiles:
    active: local
  mvc:
    async:
      request-timeout: 600000
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

advisor:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  rag:
    upload-dir: ${RAG_UPLOAD_DIR:uploads}
  memory:
    api-token: ${MEMORY_API_TOKEN:arookieofc}
    vector-store: ${MEMORY_VECTOR_STORE:pgvector}
  embedding:
    model: ${EMBEDDING_MODEL:bge-m3}
    dimension: ${EMBEDDING_DIM:1024}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  agent:
    base-url: ${AGENT_BASE_URL:http://127.0.0.1:8001}
    api-token: ${MEMORY_API_TOKEN:arookieofc}
    timeout-ms: ${AGENT_TIMEOUT_MS:600000}
    debug-stream: ${DEBUG_STREAM:true}

logging:
  level:
    cn.edu.cqut.advisorplatform: DEBUG
