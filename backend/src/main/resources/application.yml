server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/advisor_platform
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

advisor:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

logging:
  level:
    cn.edu.cqut.advisorplatform: DEBUG
