server:
  port: 8080

spring:
  application:
    name: chat-service
  profiles:
    active: local
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
  mvc:
    async:
      request-timeout: 600000
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

advisor:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  rag:
    upload-dir: ${RAG_UPLOAD_DIR:uploads}
  memory:
    api-token: ${MEMORY_API_TOKEN:}
    vector-store: ${MEMORY_VECTOR_STORE:pgvector}
  embedding:
    model: ${EMBEDDING_MODEL:bge-m3}
    dimension: ${EMBEDDING_DIM:1024}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  agent:
    base-url: ${AGENT_BASE_URL:http://127.0.0.1:8001}
    api-token: ${MEMORY_API_TOKEN:}
    timeout-ms: ${AGENT_TIMEOUT_MS:600000}
    debug-stream: ${DEBUG_STREAM:false}

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-} spanId=%X{spanId:-} turnId=%X{turnId:-}]"
  level:
    cn.edu.cqut.advisorplatform: DEBUG

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://127.0.0.1:4318/v1/traces}
