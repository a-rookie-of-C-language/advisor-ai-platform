server:
  port: 8082

spring:
  config:
    import: optional:nacos:advisor-ai-platform-common.yaml
  application:
    name: chat-service
  profiles:
    active: local
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml
  mvc:
    async:
      request-timeout: 600000
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

advisor:
  internal:
    token: ${INTERNAL_SERVICE_TOKEN:arookieofc}
  jwt:
    secret: ${JWT_SECRET:${ADVISOR_JWT_SECRET:Y25FZHVDcXV0QWR2aXNvckFpUGxhdGZvcm1Bcm9va2llb2ZjbGFuZ3VhZ2U=}}
    expiration: ${JWT_EXPIRE_MS:86400000}
  rag:
    upload-dir: ${RAG_UPLOAD_DIR:uploads}
  agent:
    base-url: ${AGENT_BASE_URL:http://127.0.0.1:8001}
    api-token: ${AGENT_API_TOKEN:${INTERNAL_SERVICE_TOKEN:arookieofc}}
    timeout-ms: ${AGENT_TIMEOUT_MS:600000}
    debug-stream: ${DEBUG_STREAM:false}

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-} spanId=%X{spanId:-} turnId=%X{turnId:-}]"
  level:
    cn.edu.cqut.advisorplatform: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://127.0.0.1:4318/v1/traces}
