<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Animated Characters</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom right, #9ca3af, #6b7280, #4b5563);
      font-family: sans-serif;
      overflow: hidden;
    }

    /* 容器 */
    .animation-wrapper {
      display: flex;
      gap: 4rem;
      align-items: center;
    }

    .canvas-container {
      position: relative;
      width: 550px;
      height: 440px; /* 留足长高变大时的空间 */
      border-bottom: 2px solid rgba(255, 255, 255, 0.2); /* 地板辅助线 */
    }

    /* 基础角色样式 */
    .char {
      position: absolute;
      bottom: 0;
      transform-origin: bottom center;
      transition: transform 0.7s ease-in-out, height 0.7s ease-in-out;
    }

    .eyes-container {
      position: absolute;
      display: flex;
      transition: left 0.7s ease-in-out, top 0.7s ease-in-out;
    }

    /* 眼睛与瞳孔基础 */
    .eye {
      border-radius: 50%;
      background-color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: height 0.15s ease-out; /* 眨眼动画 */
    }
    .pupil {
      border-radius: 50%;
      background-color: #2D2D2D;
      transition: transform 0.1s ease-out;
    }

    /* --- 紫色角色 --- */
    #purple {
      left: 70px;
      width: 180px;
      height: 400px;
      background-color: #6C3FF5;
      border-radius: 10px 10px 0 0;
      z-index: 1;
    }
    #purple .eyes-container { gap: 32px; }
    #purple .eye { width: 18px; height: 18px; }
    #purple .pupil { width: 7px; height: 7px; }

    /* --- 黑色角色 --- */
    #black {
      left: 240px;
      width: 120px;
      height: 310px;
      background-color: #2D2D2D;
      border-radius: 8px 8px 0 0;
      z-index: 2;
    }
    #black .eyes-container { gap: 24px; }
    #black .eye { width: 16px; height: 16px; }
    #black .pupil { width: 6px; height: 6px; border-radius: 50%; background-color: #2D2D2D; }

    /* --- 橙色角色 --- */
    #orange {
      left: 0px;
      width: 240px;
      height: 200px;
      background-color: #FF9B6B;
      border-radius: 120px 120px 0 0;
      z-index: 3;
    }
    #orange .eyes-container { gap: 32px; transition: all 0.2s ease-out; }
    #orange .pupil { width: 12px; height: 12px; }

    /* --- 黄色角色 --- */
    #yellow {
      left: 310px;
      width: 140px;
      height: 230px;
      background-color: #E8D754;
      border-radius: 70px 70px 0 0;
      z-index: 4;
    }
    #yellow .eyes-container { gap: 24px; transition: all 0.2s ease-out;  }
    #yellow .pupil { width: 12px; height: 12px; }
    #yellow .mouth {
      position: absolute;
      width: 80px;
      height: 4px;
      background-color: #2D2D2D;
      border-radius: 999px;
      transition: all 0.2s ease-out;
    }

    /* 测试表单面板 */
    .controls {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 100%;
      box-sizing: border-box;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="animation-wrapper">
    <!-- 动画容器 -->
    <div class="canvas-container">
      
      <!-- 紫色角色 -->
      <div id="purple" class="char">
        <div class="eyes-container" id="purple-eyes">
          <div class="eye"><div class="pupil"></div></div>
          <div class="eye"><div class="pupil"></div></div>
        </div>
      </div>

      <!-- 黑色角色 -->
      <div id="black" class="char">
        <div class="eyes-container" id="black-eyes">
          <div class="eye"><div class="pupil"></div></div>
          <div class="eye"><div class="pupil"></div></div>
        </div>
      </div>

      <!-- 橙色角色 -->
      <div id="orange" class="char">
        <div class="eyes-container" id="orange-eyes">
          <div class="pupil"></div>
          <div class="pupil"></div>
        </div>
      </div>

      <!-- 黄色角色 -->
      <div id="yellow" class="char">
        <div class="eyes-container" id="yellow-eyes">
          <div class="pupil"></div>
          <div class="pupil"></div>
        </div>
        <div class="mouth" id="yellow-mouth"></div>
      </div>

    </div>

    <!-- 控制面板 (用来触发动画互动) -->
    <div class="controls">
      <h3>Interaction Test</h3>
      <input type="text" id="email" placeholder="Typing test (Email)">
      <input type="password" id="password" placeholder="Password test">
      <label class="toggle">
        <input type="checkbox" id="showPassword"> Show Password
      </label>
    </div>
  </div>

  <script>
    // 状态管理
    const store = {
      mouseX: 0,
      mouseY: 0,
      isTyping: false,
      showPassword: false,
      passwordLength: 0,
      isLookingAtEachOther: false,
      isPurplePeeking: false,
      isEmailFocused: false,
      isPasswordFocused: false
    };

    // 监听鼠标
    window.addEventListener('mousemove', (e) => {
      store.mouseX = e.clientX;
      store.mouseY = e.clientY;
      render(); // 即时更新位置
    });

    // 绑定交互控件
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const showPasswordCb = document.getElementById('showPassword');

    const handleTyping = () => {
      // 只有在输入框聚焦的时候才产生相互看的效果
      if (store.isEmailFocused || store.isPasswordFocused) {
        store.isLookingAtEachOther = true;
        clearTimeout(window.typingTimeout);
        window.typingTimeout = setTimeout(() => {
          store.isLookingAtEachOther = false;
          render();
        }, 800);
      }
      render();
    };

    emailInput.addEventListener('input', handleTyping);
    emailInput.addEventListener('focus', () => { 
      store.isEmailFocused = true; 
      store.isTyping = true; 
      render(); 
    });
    emailInput.addEventListener('blur', () => { 
      store.isEmailFocused = false; 
      store.isTyping = false; 
      render(); 
    });
    
    passwordInput.addEventListener('input', (e) => {
      store.passwordLength = e.target.value.length;
      handleTyping();
    });
    passwordInput.addEventListener('focus', () => { 
      store.isPasswordFocused = true; 
      render(); 
    });
    passwordInput.addEventListener('blur', () => { 
      store.isPasswordFocused = false; 
      render(); 
    });

    showPasswordCb.addEventListener('change', (e) => {
      store.showPassword = e.target.checked;
      passwordInput.type = store.showPassword ? 'text' : 'password';
      render();
    });

    // 随机眨眼逻辑
    const setupBlink = (charId, minRef) => {
      const eyeElements = document.querySelectorAll(`#${charId} .eye`);
      const blink = () => {
        eyeElements.forEach(el => el.style.height = '2px'); // 闭眼
        setTimeout(() => {
          eyeElements.forEach(el => el.style.height = ''); // 睁眼 (恢复通过 CSS class 的高度)
          setTimeout(blink, Math.random() * 4000 + 3000);
        }, 150);
      };
      setTimeout(blink, Math.random() * 4000 + 3000);
    };
    setupBlink('purple');
    setupBlink('black');

    // 紫色小人偷看的逻辑
    setInterval(() => {
      if (store.passwordLength > 0 && store.showPassword) {
        if(Math.random() > 0.5) {
          store.isPurplePeeking = true;
          render();
          setTimeout(() => {
            store.isPurplePeeking = false;
            render();
          }, 800);
        }
      } else {
        store.isPurplePeeking = false;
      }
    }, 2500);

    // 辅助计算函数
    const calculateBodyPosition = (elementId) => {
      const el = document.getElementById(elementId);
      const rect = el.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 3;

      const deltaX = store.mouseX - centerX;
      const deltaY = store.mouseY - centerY;

      const faceX = Math.max(-15, Math.min(15, deltaX / 20));
      const faceY = Math.max(-10, Math.min(10, deltaY / 30));
      const bodySkew = Math.max(-6, Math.min(6, -deltaX / 120));

      return { faceX, faceY, bodySkew, el };
    };

    const updatePupils = (containerId, maxDistance, forceLook) => {
      const container = document.getElementById(containerId);
      const pupils = container.querySelectorAll('.pupil');
      
      pupils.forEach(pupil => {
        let x=0, y=0;
        if (forceLook) {
          x = forceLook.x;
          y = forceLook.y;
        } else {
          const rect = pupil.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;
          
          const deltaX = store.mouseX - centerX;
          const deltaY = store.mouseY - centerY;
          const distance = Math.min(Math.sqrt(deltaX**2 + deltaY**2), maxDistance);
          
          const angle = Math.atan2(deltaY, deltaX);
          x = Math.cos(angle) * distance;
          y = Math.sin(angle) * distance;
        }
        pupil.style.transform = `translate(${x}px, ${y}px)`;
      });
    };

    // 核心渲染循环
    const render = () => {
      const isHidingPassword = store.isPasswordFocused && store.passwordLength > 0 && !store.showPassword;
      const isVisiblePassword = store.passwordLength > 0 && store.showPassword;

      const pPos = calculateBodyPosition('purple');
      const bPos = calculateBodyPosition('black');
      const oPos = calculateBodyPosition('orange');
      const yPos = calculateBodyPosition('yellow');

      // --- Purple ---
      pPos.el.style.height = (store.isEmailFocused || isHidingPassword) ? '440px' : '400px';
      if (isVisiblePassword) {
        pPos.el.style.transform = `skewX(0deg)`;
      } else if (store.isEmailFocused || isHidingPassword) {
        pPos.el.style.transform = `skewX(${pPos.bodySkew - 12}deg) translateX(40px)`;
      } else {
        pPos.el.style.transform = `skewX(${pPos.bodySkew}deg)`;
      }

      const pEyes = document.getElementById('purple-eyes');
      if (isVisiblePassword) {
        pEyes.style.left = `20px`; pEyes.style.top = `35px`;
        updatePupils('purple-eyes', 5, {x: store.isPurplePeeking ? 4 : -4, y: store.isPurplePeeking ? 5 : -4});
      } else if (store.isLookingAtEachOther) {
        pEyes.style.left = `55px`; pEyes.style.top = `65px`;
        updatePupils('purple-eyes', 5, {x: 3, y: 4});
      } else {
        pEyes.style.left = `${45 + pPos.faceX}px`; pEyes.style.top = `${40 + pPos.faceY}px`;
        updatePupils('purple-eyes', 5, null);
      }

      // --- Black ---
      if (isVisiblePassword) {
        bPos.el.style.transform = `skewX(0deg)`;
      } else if (store.isLookingAtEachOther) {
        bPos.el.style.transform = `skewX(${bPos.bodySkew * 1.5 + 10}deg) translateX(20px)`;
      } else if (store.isEmailFocused || isHidingPassword) {
        bPos.el.style.transform = `skewX(${bPos.bodySkew * 1.5}deg)`;
      } else {
        bPos.el.style.transform = `skewX(${bPos.bodySkew}deg)`;
      }

      const bEyes = document.getElementById('black-eyes');
      if (isVisiblePassword) {
        bEyes.style.left = `10px`; bEyes.style.top = `28px`;
        updatePupils('black-eyes', 4, {x: -4, y: -4});
      } else if (store.isLookingAtEachOther) {
        bEyes.style.left = `32px`; bEyes.style.top = `12px`;
        updatePupils('black-eyes', 4, {x: 0, y: -4});
      } else {
        bEyes.style.left = `${26 + bPos.faceX}px`; bEyes.style.top = `${32 + bPos.faceY}px`;
        updatePupils('black-eyes', 4, null);
      }

      // --- Orange ---
      oPos.el.style.transform = isVisiblePassword ? `skewX(0deg)` : `skewX(${oPos.bodySkew}deg)`;
      const oEyes = document.getElementById('orange-eyes');
      if (isVisiblePassword) {
        oEyes.style.left = `50px`; oEyes.style.top = `85px`;
        updatePupils('orange-eyes', 5, {x: -5, y: -4});
      } else {
        oEyes.style.left = `${82 + oPos.faceX}px`; oEyes.style.top = `${90 + oPos.faceY}px`;
        updatePupils('orange-eyes', 5, null);
      }

      // --- Yellow ---
      yPos.el.style.transform = isVisiblePassword ? `skewX(0deg)` : `skewX(${yPos.bodySkew}deg)`;
      const yEyes = document.getElementById('yellow-eyes');
      const yMouth = document.getElementById('yellow-mouth');
      if (isVisiblePassword) {
        yEyes.style.left = `20px`; yEyes.style.top = `35px`;
        yMouth.style.left = `10px`; yMouth.style.top = `88px`;
        updatePupils('yellow-eyes', 5, {x: -5, y: -4});
      } else {
        yEyes.style.left = `${52 + yPos.faceX}px`; yEyes.style.top = `${40 + yPos.faceY}px`;
        yMouth.style.left = `${40 + yPos.faceX}px`; yMouth.style.top = `${88 + yPos.faceY}px`;
        updatePupils('yellow-eyes', 5, null);
      }
    };

    // 初始渲染
    render();
  </script>
</body>
</html>
