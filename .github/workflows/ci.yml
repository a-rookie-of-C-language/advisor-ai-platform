name: CI

on:
  push:
    branches: ["master", "refactor/**"]
  pull_request:
    branches: ["master", "refactor/**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  encoding-guard:
    name: Encoding Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect UTF-8 BOM in text sources
        shell: bash
        run: |
          set -e
          found=0
          while IFS= read -r -d '' f; do
            bom=$(xxd -p -l 3 "$f" | tr -d '\n')
            if [ "$bom" = "efbbbf" ]; then
              echo "::error file=$f::UTF-8 BOM detected"
              found=1
            fi
          done < <(
            find agent backend frontend scripts \
              \( -type d \( -name target -o -name .venv -o -name __pycache__ -o -name node_modules -o -name dist -o -name build \) -prune \) \
              -o \
              \( -type f \
                \( -name '*.py' -o -name '*.js' -o -name '*.mjs' -o -name '*.cjs' -o -name '*.ts' -o -name '*.tsx' -o -name '*.json' -o -name '*.yml' -o -name '*.yaml' -o -name '*.java' \) \
                -print0 \)
          )
          if [ "$found" -ne 0 ]; then
            echo "BOM check failed."
            exit 1
          fi

      - name: Dry-run text cleanup guard
        shell: pwsh
        run: ./scripts/clean_text_encoding.ps1 -DryRun

  build-java:
    name: Java (Maven Build + Test)
    runs-on: ubuntu-latest
    needs: [encoding-guard]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build all modules
        run: mvn -q -DskipTests package

      - name: Run tests
        run: mvn -q test

  build-frontend:
    name: Frontend (Build)
    runs-on: ubuntu-latest
    needs: [encoding-guard]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  build-python:
    name: Python (.venv + compile + test)
    runs-on: ubuntu-latest
    needs: [encoding-guard]
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create project venv
        run: python -m venv .venv

      - name: Install dependencies in venv
        shell: bash
        run: |
          set -e
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check in venv
        shell: bash
        run: |
          set -e
          source .venv/bin/activate
          python -m compileall app.py agents chat context graph llm RAG tools -q

      - name: Run tests in venv
        shell: bash
        run: |
          set -e
          source .venv/bin/activate
          pytest -q

  e2e-chat:
    name: E2E Chat Drill (Gateway + Services + Agent)
    runs-on: ubuntu-latest
    needs: [build-java, build-frontend, build-python]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: advisor_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d advisor_ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      nacos:
        image: nacos/nacos-server:v2.4.2
        env:
          MODE: standalone
        ports:
          - 8848:8848

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: advisor_ai
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      JWT_SECRET: Y2lqd3RzZWNyZXRmb3JlMmVvbmx5Y25lZHVjcXV0YXJvb2tpZW9mYw==
      JWT_EXPIRE_MS: 86400000
      MEMORY_API_TOKEN: arookieofc
      AGENT_API_TOKEN: arookieofc
      AGENT_BASE_URL: http://127.0.0.1:8001
      AGENT_TIMEOUT_MS: 600000
      DEBUG_STREAM: "false"

      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/advisor_ai
      AGENT_MODE: api
      AGENT_API_HOST: 127.0.0.1
      AGENT_API_PORT: 8001
      MEMORY_API_BASE_URL: http://localhost:8080
      MEMORY_API_TIMEOUT_SEC: 30
      MEMORY_API_MAX_RETRIES: 2
      MEMORY_API_RETRY_BACKOFF_SEC: 0.3
      NACOS_SERVER_ADDR: 127.0.0.1:8848

      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_TEMPERATURE: 0.2
      OPENAI_TIMEOUT_SEC: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate LLM secrets
        shell: bash
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::OPENAI_API_KEY secret is required for e2e-chat"
            exit 1
          fi
          if [ -z "${OPENAI_BASE_URL}" ]; then
            echo "OPENAI_BASE_URL=https://api.openai.com/v1" >> "$GITHUB_ENV"
          fi
          if [ -z "${OPENAI_MODEL}" ]; then
            echo "OPENAI_MODEL=gpt-4o-mini" >> "$GITHUB_ENV"
          fi

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install backend modules to local m2
        shell: bash
        run: |
          cd backend
          mvn -q -DskipTests install

      - name: Start auth-service
        shell: bash
        run: |
          cd backend/auth-service
          nohup mvn -q spring-boot:run > ../../auth-e2e.log 2>&1 &

      - name: Start chat-service
        shell: bash
        run: |
          cd backend/chat-service
          nohup env SERVER_PORT=8082 SPRING_DATASOURCE_URL=jdbc:postgresql://127.0.0.1:5432/advisor_ai mvn -q spring-boot:run > ../../chat-e2e.log 2>&1 &

      - name: Start audit-service
        shell: bash
        run: |
          cd backend/audit-service
          nohup mvn -q spring-boot:run > ../../audit-e2e.log 2>&1 &

      - name: Start gateway
        shell: bash
        run: |
          cd backend/gateway
          nohup env SERVER_PORT=8080 mvn -q spring-boot:run > ../../gateway-e2e.log 2>&1 &

      - name: Start agent (.venv)
        shell: bash
        run: |
          cd agent
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          nohup .venv/bin/python app.py --mode api > ../agent-e2e.log 2>&1 &

      - name: Wait for dependencies and health
        shell: bash
        run: |
          set -e

          echo "Waiting Nacos..."
          for i in {1..90}; do
            if curl -fsS "http://localhost:8848/nacos/v1/console/health/liveness" >/dev/null; then
              echo "nacos is ready"
              break
            fi
            if [ "$i" = "90" ]; then
              echo "nacos not ready"
              exit 1
            fi
            sleep 2
          done

          echo "Waiting auth-service..."
          for i in {1..120}; do
            if curl -fsS http://localhost:8081/internal/health >/dev/null; then
              echo "auth-service is ready"
              break
            fi
            if [ "$i" = "120" ]; then
              echo "auth-service not ready"
              exit 1
            fi
            sleep 2
          done

          echo "Waiting chat-service..."
          for i in {1..120}; do
            if curl -fsS http://localhost:8082/internal/health >/dev/null; then
              echo "chat-service is ready"
              break
            fi
            if [ "$i" = "120" ]; then
              echo "chat-service not ready"
              exit 1
            fi
            sleep 2
          done

          echo "Waiting gateway..."
          for i in {1..120}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/internal/health || true)
            if [ "$code" = "200" ]; then
              echo "gateway is ready"
              break
            fi
            if [ "$i" = "120" ]; then
              echo "gateway not ready"
              exit 1
            fi
            sleep 2
          done

          echo "Waiting agent..."
          for i in {1..120}; do
            if curl -fsS http://localhost:8001/health >/dev/null; then
              echo "agent is ready"
              break
            fi
            if [ "$i" = "120" ]; then
              echo "agent not ready"
              exit 1
            fi
            sleep 2
          done

      - name: Run chat e2e drill (full)
        run: node scripts/chat_e2e_drill.mjs full http://localhost:8080 http://127.0.0.1:8001

      - name: Print logs on failure
        if: failure()
        shell: bash
        run: |
          echo "===== gateway-e2e.log (tail 300) ====="
          tail -n 300 gateway-e2e.log || true
          echo "===== auth-e2e.log (tail 300) ====="
          tail -n 300 auth-e2e.log || true
          echo "===== chat-e2e.log (tail 300) ====="
          tail -n 300 chat-e2e.log || true
          echo "===== audit-e2e.log (tail 300) ====="
          tail -n 300 audit-e2e.log || true
          echo "===== agent-e2e.log (tail 300) ====="
          tail -n 300 agent-e2e.log || true

      - name: Upload e2e logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-chat-logs
          path: |
            gateway-e2e.log
            auth-e2e.log
            chat-e2e.log
            audit-e2e.log
            agent-e2e.log
