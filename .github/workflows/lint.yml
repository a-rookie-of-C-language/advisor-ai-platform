name: Lint

on:
  push:
    branches: ["master", "refactor/**"]
  pull_request:
    branches: ["master", "refactor/**"]

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Python (venv + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create project venv
        run: python -m venv .venv

      - name: Install dependencies in venv
        shell: bash
        run: |
          set -e
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ruff in venv
        shell: bash
        run: |
          set -e
          source .venv/bin/activate
          ruff check .

  lint-frontend:
    name: Frontend (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  lint-java:
    name: Java (Spotless + Checkstyle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Spotless check
        run: mvn -q -DskipTests spotless:check

      - name: Checkstyle check
        run: mvn -q -DskipTests checkstyle:check
